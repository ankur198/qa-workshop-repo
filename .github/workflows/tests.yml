name: QA Test Suite
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Playwright Tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: https://www.saucedemo.com

      - name: Generate test report
        if: always()
        run: npx playwright show-report --host 0.0.0.0

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Post results summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
              const comment = `## 🧪 Test Results\n` +
                `| Metric | Value |\n` +
                `|--------|-------|\n` +
                `| ✅ Passed | ${results.stats.passed} |\n` +
                `| ❌ Failed | ${results.stats.failed} |\n` +
                `| ⏭️ Skipped | ${results.stats.skipped} |\n` +
                `| ⏱️ Duration | ${results.stats.duration}ms |\n`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('Could not post results comment');
            }
